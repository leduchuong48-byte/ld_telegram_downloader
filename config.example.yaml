# Telegram API
api_hash: your_api_hash
api_id: your_api_id

# Optional: Telegram Bot token (leave empty if not using bot commands)
bot_token: ""

# Download targets
chat: []

# File filtering
file_formats:
  audio:
    - all
  document:
    - all
  video:
    - all

media_types:
  - video
  - audio
  - document
  - photo
  - voice

# Storage
save_path: /app/downloads
file_path_prefix:
  - chat_title
  - media_datetime

# Runtime behavior
language: ZH
max_download_task: 1
max_upload_task: 1
max_concurrent_transmissions: 1
max_download_concurrent_transmissions: 1
max_upload_concurrent_transmissions: 1
queue_max_size: 2
upload_queue_max_size: 5
flood_wait_extra: 10
download_timeout: 1800
upload_timeout: 900

# WebUI
web_host: 0.0.0.0
web_port: 5000
# Leave empty to disable login; set a strong secret to enable login
web_login_secret: "change_me"

# Access control
allowed_user_ids:
  - 'me'
